<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>安享伴 - 智慧养老（GitHub Pages 专用版）</title>
    <style>
        :root {
            --primary-teal: #16A085;
            --primary-orange: #D35400;
            --primary-red: #C0392B;
            --bg-deep-blue: #2C3E50;
            --bg-green: #27AE60;
            --bg-yellow: #F1C40F;
            --bg-purple: #8E44AD;
            --text-white: #ECF0F1;
            --border-width: 4px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: #E0E6ED; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }

        .phone-mockup {
            width: 375px; height: 812px; background: #111; border-radius: 40px; padding: 12px; position: relative;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4); overflow: hidden;
        }

        .phone-status-bar {
            position: absolute; top: 0; left: 0; width: 100%; height: 44px; background: #111;
            display: flex; justify-content: space-between; align-items: center; padding: 0 25px; z-index: 10;
            color: white; font-size: 14px; font-weight: 600;
        }

        .wechat-capsule {
            display: flex; align-items: center; background: rgba(255, 255, 255, 0.2);
            border-radius: 20px; padding: 4px 10px; border: 1px solid rgba(255,255,255,0.1);
        }
        .capsule-dot { width: 4px; height: 4px; background: white; border-radius: 50%; box-shadow: 8px 0 0 white, -8px 0 0 white; }
        .capsule-line { width: 1px; height: 16px; background: rgba(255,255,255,0.3); margin: 0 10px; }
        .capsule-circle { width: 16px; height: 16px; border: 2px solid white; border-radius: 50%; }

        .screen { width: 100%; height: 100%; background-color: var(--bg-deep-blue); border-radius: 30px; overflow: hidden; position: relative; padding-top: 44px; }

        .page {
            position: absolute; top: 44px; left: 0; width: 100%; height: calc(100% - 44px);
            display: flex; flex-direction: column; opacity: 0; pointer-events: none;
            transition: all 0.3s ease; transform: translateY(20px); overflow-y: auto;
        }
        .page.active { opacity: 1; pointer-events: auto; transform: translateY(0); }

        /* 首页设计 */
        .home-title { text-align: center; padding: 30px 20px; background: var(--primary-teal); color: var(--text-white); border-bottom: var(--border-width) solid #FFF; }
        .home-title h1 { font-size: 36px; font-weight: 900; }

        .home-buttons { flex: 1; display: flex; flex-direction: column; justify-content: space-evenly; padding: 20px 0; border-bottom: var(--border-width) solid #FFF; }
        .big-btn {
            width: 85%; margin: 0 auto; border-radius: 20px; padding: 25px; color: var(--text-white);
            border: var(--border-width) solid #FFF; cursor: pointer; display: flex; align-items: center;
        }
        .btn-call { background: var(--primary-orange); }
        .btn-emergency { background: var(--primary-red); }
        .big-btn span { font-size: 28px; font-weight: 900; margin-left: 15px; }

        .home-links { display: grid; grid-template-columns: 1fr 1fr; background: var(--bg-deep-blue); }
        .link-item { padding: 25px; border: 2px solid #FFF; cursor: pointer; text-align: center; color: white; }
        .link-item h3 { font-size: 22px; }

        /* 列表页设计 */
        .page-header { display: flex; align-items: center; padding: 15px 20px; background: var(--primary-teal); color: white; border-bottom: var(--border-width) solid #FFF; }
        .back-btn { width: 40px; height: 40px; background: rgba(255,255,255,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-right: 10px; cursor: pointer; }

        .grid-services { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 15px; }
        .service-box { background: white; border-radius: 20px; padding: 10px; border: 3px solid #FFF; text-align: center; }
        .service-box img { width: 100%; height: 90px; border-radius: 12px; object-fit: cover; background: #eee; }
        .service-box h3 { font-size: 20px; margin-top: 8px; color: var(--bg-deep-blue); }

        .wiki-card { background: white; border-radius: 20px; padding: 15px; margin: 10px 15px; display: flex; align-items: center; border: 3px solid #FFF; }
        .wiki-card img { width: 70px; height: 70px; border-radius: 10px; margin-right: 15px; }

        .pulsing { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

<div class="phone-mockup">
    <div class="phone-status-bar">
        <span>10:26</span>
        <div class="wechat-capsule"><div class="capsule-dot"></div><div class="capsule-line"></div><div class="capsule-circle"></div></div>
    </div>

    <div class="screen">
        <div id="p1" class="page active">
            <div class="home-title"><h1>安享伴</h1><p>智慧养老 ・ 触手可及</p></div>
            <div class="home-buttons">
                <div class="big-btn btn-call pulsing" onclick="nav('p2')"><div style="font-size:40px">📞</div><span>一键呼叫子女</span></div>
                <div class="big-btn btn-emergency" onclick="nav('p3')"><div style="font-size:40px">🆘</div><span>一键紧急求助</span></div>
            </div>
            <div class="home-links">
                <div class="link-item" onclick="nav('p4')" style="background:var(--bg-green)"><h3>上门服务</h3></div>
                <div class="link-item" onclick="nav('p5')" style="background:var(--bg-yellow); color:#333"><h3>生活百科</h3></div>
            </div>
        </div>

        <div id="p2" class="page" style="background:var(--primary-orange); justify-content:center; align-items:center; text-align:center; color:white;">
            <div style="font-size:80px" class="pulsing">📞</div>
            <h2 style="font-size:32px; margin-top:20px;">正在呼叫子女...</h2>
            <button onclick="nav('p1')" style="margin-top:50px; padding:15px 40px; border-radius:30px; border:none; font-weight:bold;">挂断</button>
        </div>

        <div id="p3" class="page" style="background:var(--primary-red); justify-content:center; align-items:center; text-align:center; color:white; padding:20px;">
            <div style="font-size:80px">🆘</div>
            <h2 style="font-size:32px;">救援信息已发出</h2>
            <div style="background:rgba(0,0,0,0.2); padding:20px; border-radius:20px; margin-top:20px; text-align:left; width:100%;">
                <p>✅ 已通知子女</p><p>✅ 已通知社区服务站</p><p>✅ GPS 定位已发送</p>
            </div>
            <button onclick="nav('p1')" style="margin-top:30px; padding:15px 40px; border-radius:30px; border:none; font-weight:bold;">我已安全</button>
        </div>

        <div id="p4" class="page" style="background:var(--bg-green)">
            <div class="page-header" style="background:var(--bg-green)"><div class="back-btn" onclick="nav('p1')">❮</div><h2 class="header-title">上门服务</h2></div>
            <div class="grid-services">
                <div class="service-box"><img src="https://images.unsplash.com/photo-1516714435131-44d6b64dc092?w=200"><h3>助餐服务</h3></div>
                <div class="service-box"><img src="https://images.unsplash.com/photo-1584622650111-993a426fbf0a?w=200"><h3>助洁服务</h3></div>
                <div class="service-box"><img src="https://images.unsplash.com/photo-1513159419869-1a3e279a1a0c?w=200"><h3>助浴理发</h3></div>
                <div class="service-box"><img src="https://images.unsplash.com/photo-1471864190281-a93a307246de?w=200"><h3>代购代缴</h3></div>
            </div>
            <button class="big-btn" style="background:var(--bg-deep-blue); margin-top:auto; margin-bottom:20px; justify-content:center;" onclick="alert('预约成功')"><span>一键预约</span></button>
        </div>

        <div id="p5" class="page" style="background:var(--bg-yellow)">
            <div class="page-header" style="background:var(--bg-yellow); color:#333;"><div class="back-btn" onclick="nav('p1')" style="background:rgba(0,0,0,0.1)">❮</div><h2>生活百科</h2></div>
            <div class="wiki-card"><img src="https://images.unsplash.com/photo-1563986768609-322da13575f3?w=100"><div><h4>防诈骗手册</h4><p>守好养老钱</p></div></div>
            <div class="wiki-card"><img src="https://images.unsplash.com/photo-1506126613408-eca07ce68773?w=100"><div><h4>养生小常识</h4><p>春季饮食指引</p></div></div>
            <div style="margin-top:auto; padding:20px; text-align:center; font-weight:bold;">🔊 语音播报模式已开启</div>
        </div>
    </div>
</div>

<script>
    function nav(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }
</script>

</body>
</html>
